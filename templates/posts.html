
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts</title>

<style>
body{
    margin:0;
    background:#0b1220;
    color:white;
    font-family:'Segoe UI', sans-serif;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:15px;
}

/* CARD */
.post{
    background:#111827;
    border-radius:18px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

/* HOVER */
.post:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 35px rgba(0,0,0,0.9);
}

/* IMAGEN */
.post img{
    width:100%;
    height:180px;
    object-fit:cover;
}

/* CONTENIDO */
.content{
    padding:12px;
}

/* BADGE */
.badge{
    font-size:12px;
    background:#ff8c00;
    padding:4px 8px;
    border-radius:6px;
    display:inline-block;
    margin-bottom:8px;
}

/* BOTONES */
.actions{
    display:flex;
    gap:8px;
}

/* BOTÓN */
.btn{
    flex:1;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-size:14px;
    text-decoration:none;
    font-weight:bold;
    transition:0.2s;
}

/* VIDEO */
.yt{
    background:#ef4444;
    color:white;
}

/* DESCARGA */
.file{
    background:#22c55e;
    color:black;
}

.btn:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<div class="container">

{% for p in posts %}

<div class="post">

<img src="{{p.thumbnail}}">

<div class="content">

<span class="badge">🔥 Nuevo</span>

<div class="actions">
<a class="btn yt" href="{{p.youtube}}" target="_blank">🎬 Ver</a>
<a class="btn file" href="{{p.file}}" target="_blank">⬇️ Descargar</a>
</div>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
